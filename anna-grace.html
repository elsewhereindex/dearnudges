    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Quicksand', -apple-system, sans-serif;
            background: #FAFAFD;
            color: #2D2D2D;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 0 24px;
            -webkit-font-smoothing: antialiased;
        }

        .container {
            max-width: 640px;
            width: 100%;
            padding: 60px 0 40px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        a.back {
            font-size: 0.85rem;
            color: #8396D1;
            text-decoration: none;
            font-weight: 500;
            display: inline-block;
            margin-bottom: 32px;
            align-self: flex-start;
        }

        a.back:hover { text-decoration: underline; }

        .photo {
            max-width: 100%;
            border-radius: 16px;
            box-shadow: 0 8px 32px rgba(131, 150, 209, 0.15);
        }

        footer {
            font-size: 0.75rem;
            color: #7A767B;
            padding-bottom: 80px;
            line-height: 1.7;
            text-align: center;
            margin-top: 40px;
        }

        footer a { color: #7A767B; text-decoration: none; }
        footer a:hover { text-decoration: underline; }

        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: #8396D1;
            border-top: none;
            display: flex;
            justify-content: center;
            gap: 0;
            padding: 0;
            z-index: 20;
        }

        .bottom-nav a {
            flex: 1;
            max-width: 140px;
            text-align: center;
            padding: 10px 0 calc(10px + env(safe-area-inset-bottom, 0px));
            font-family: 'Quicksand', sans-serif;
            font-size: 0.72rem;
            font-weight: 600;
            color: rgba(255, 255, 255, 0.7);
            text-decoration: none;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 3px;
            transition: color 0.15s ease;
        }

        .bottom-nav a:hover,
        .bottom-nav a.active {
            color: #FFFFFF;
        }

        .bottom-nav svg {
            width: 20px;
            height: 20px;
            fill: none;
            stroke: currentColor;
            stroke-width: 1.8;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        @media (max-width: 480px) {
            .container { padding: 40px 0 32px; }
        }
    </style>
</head>
