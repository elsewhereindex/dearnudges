<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dear Anna Grace</title>
    <link rel="icon" type="image/png" href="../app-icon.png">
    <link rel="apple-touch-icon" href="../app-icon.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;1,9..144,400;1,9..144,700&family=Quicksand:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Quicksand', -apple-system, sans-serif;
            background: #FAFAFD;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 24px;
            overflow: hidden;
            -webkit-font-smoothing: antialiased;
        }

        .reveal {
            text-align: center;
            opacity: 0;
            transform: scale(0.9);
            animation: fadeUp 0.8s ease-out 0.3s forwards;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .badge {
            font-family: 'Quicksand', sans-serif;
            font-size: 0.72rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.12em;
            color: #5C85D6;
            background: rgba(92, 133, 214, 0.1);
            padding: 6px 16px;
            border-radius: 20px;
            display: inline-block;
            margin-bottom: 20px;
            opacity: 0;
            animation: fadeUp 0.6s ease-out 0.8s forwards;
        }

        .photo-frame {
            margin-bottom: 28px;
            position: relative;
            display: inline-block;
        }

        .photo-frame img {
            width: 280px;
            max-width: 80vw;
            border-radius: 20px;
            box-shadow: 0 12px 48px rgba(131, 150, 209, 0.25);
        }

        h1 {
            font-family: 'Fraunces', Georgia, serif;
            font-style: italic;
            font-weight: 700;
            font-size: 2.2rem;
            color: #5C85D6;
            margin-bottom: 8px;
            line-height: 1.2;
        }

        .message {
            font-family: 'Quicksand', sans-serif;
            font-size: 0.95rem;
            color: #7A767B;
            line-height: 1.5;
            opacity: 0;
            animation: fadeUp 0.6s ease-out 1.2s forwards;
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(12px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Confetti */
        .confetti-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 10;
        }

        .confetti {
            position: absolute;
            border-radius: 50%;
            opacity: 0;
            animation: confettiFall 2.5s ease-out forwards;
        }

        @keyframes confettiFall {
            0% {
                opacity: 1;
                transform: translateY(0) rotate(0deg) scale(1);
            }
            70% {
                opacity: 1;
            }
            100% {
                opacity: 0;
                transform: translateY(100vh) rotate(720deg) scale(0.5);
            }
        }

        @media (max-width: 480px) {
            h1 { font-size: 1.7rem; }
            .photo-frame img { width: 240px; border-radius: 16px; }
        }
    </style>
</head>
<body>

<div class="confetti-container" id="confetti"></div>

<div class="reveal">
    <div class="photo-frame">
        <img src="../anna-grace.jpg" alt="Anna Grace">
    </div>
    <span class="badge">You found an easter egg</span>
    <h1>Dear Anna Grace</h1>
    <p class="message">One of the good ones.</p>
</div>

<script>
    // Confetti burst matching the app's ConfettiView colors
    (function() {
        var colors = ['#5C85D6', '#7CA0E6', '#6B7F5E', '#C4994C', '#7A8FA3'];
        var container = document.getElementById('confetti');

        for (var i = 0; i < 40; i++) {
            var dot = document.createElement('div');
            dot.className = 'confetti';
            var size = Math.random() * 8 + 4;
            dot.style.width = size + 'px';
            dot.style.height = size + 'px';
            dot.style.background = colors[Math.floor(Math.random() * colors.length)];
            dot.style.left = (Math.random() * 100) + '%';
            dot.style.top = (Math.random() * 40 - 20) + '%';
            dot.style.animationDelay = (Math.random() * 0.6) + 's';
            dot.style.animationDuration = (Math.random() * 1.5 + 1.5) + 's';
            container.appendChild(dot);
        }
    })();
</script>

</body>
</html>
