<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dear Friends</title>
    <link rel="icon" type="image/png" href="app-icon.png">
    <link rel="apple-touch-icon" href="app-icon.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@1,9..144,400;1,9..144,700&family=Quicksand:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Quicksand', -apple-system, sans-serif;
            background: #FAFAFD;
            color: #2D2D2D;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 0 24px;
            -webkit-font-smoothing: antialiased;
        }

        .container {
            max-width: 640px;
            width: 100%;
            padding: 60px 0 40px;
            text-align: center;
        }

        a.back {
            font-size: 0.85rem;
            color: #8396D1;
            text-decoration: none;
            font-weight: 500;
            display: inline-block;
            margin-bottom: 32px;
            text-align: left;
            width: 100%;
        }

        a.back:hover { text-decoration: underline; }

        h1 {
            font-family: 'Fraunces', Georgia, serif;
            font-style: italic;
            font-weight: 700;
            font-size: 2rem;
            color: #5C85D6;
            margin-bottom: 12px;
        }

        .subtitle {
            font-size: 0.95rem;
            color: #7A767B;
            margin-bottom: 40px;
            line-height: 1.55;
        }

        .friends-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 24px;
            margin-bottom: 48px;
        }

        .friend {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }

        .friend img {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            object-fit: cover;
            box-shadow: 0 4px 16px rgba(131, 150, 209, 0.15);
        }

        .friend .name-only {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            background: #EDEEF7;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Fraunces', Georgia, serif;
            font-style: italic;
            font-size: 1.4rem;
            color: #8396D1;
            box-shadow: 0 4px 16px rgba(131, 150, 209, 0.1);
        }

        .friend-name {
            font-family: 'Quicksand', sans-serif;
            font-weight: 600;
            font-size: 0.85rem;
            color: #2D2D2D;
        }

        .divider {
            width: 64px;
            height: 1px;
            background: rgba(92, 133, 214, 0.25);
            margin: 0 auto 32px;
        }

        .note {
            font-size: 0.88rem;
            color: #7A767B;
            line-height: 1.6;
            max-width: 420px;
            margin: 0 auto 40px;
        }

        .note a {
            color: #5C85D6;
            text-decoration: none;
            font-weight: 600;
        }

        .note a:hover { text-decoration: underline; }

        footer {
            font-size: 0.75rem;
            color: #7A767B;
            padding-bottom: 24px;
            line-height: 1.7;
            text-align: center;
        }

        footer a { color: #7A767B; text-decoration: none; }
        footer a:hover { text-decoration: underline; }

        @media (max-width: 480px) {
            .container { padding: 40px 0 32px; }
            h1 { font-size: 1.65rem; }
            .friends-grid { grid-template-columns: repeat(2, 1fr); gap: 20px; }
            .friend img, .friend .name-only { width: 100px; height: 100px; }
            .friend .name-only { font-size: 1.2rem; }
        }
    </style>
</head>
<body>

<div class="container">
    <a href="/" class="back">&larr; Back to Dear</a>

    <h1>Dear Friends</h1>
    <p class="subtitle">The people who make Dear possible.</p>

    <div class="friends-grid">
        <div class="friend">
            <img src="anna-grace.jpg" alt="Anna Grace">
            <span class="friend-name">Anna Grace</span>
        </div>
        <!-- Add more friends here as they opt in:
        <div class="friend">
            <img src="photos/name.jpg" alt="Name">
            <span class="friend-name">Name</span>
        </div>
        <div class="friend">
            <div class="name-only">JD</div>
            <span class="friend-name">Jane D.</span>
        </div>
        -->
    </div>

    <div class="divider"></div>

    <p class="note">Dear Friends are the supporters who keep Dear independent. If you'd like to join them, you can become a Dear Friend inside the app under Settings.</p>

    <footer>
        <p>&copy; 2026 Elsewhere Index LLC</p>
    </footer>
</div>

</body>
</html>
