<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Dear Color Mockups</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;600;700&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  body {
    font-family: 'Quicksand', -apple-system, sans-serif;
    background: #1a1a2e;
    color: #fff;
    min-height: 100vh;
    padding: 0 0 60px 0;
  }

  .page-header {
    text-align: center;
    padding: 50px 20px 10px;
  }
  .page-header h1 {
    font-family: Georgia, 'Times New Roman', serif;
    font-style: italic;
    font-size: 28px;
    font-weight: 400;
    color: #ccc;
    letter-spacing: 0.5px;
  }
  .page-header p {
    font-size: 14px;
    color: #888;
    margin-top: 8px;
  }

  .color-nav {
    position: sticky;
    top: 0;
    z-index: 100;
    background: #1a1a2e;
    border-bottom: 1px solid rgba(255,255,255,0.08);
    padding: 12px 16px;
    display: flex;
    gap: 8px;
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
    scrollbar-width: none;
  }
  .color-nav::-webkit-scrollbar { display: none; }
  .color-nav a {
    flex-shrink: 0;
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 8px 14px;
    border-radius: 20px;
    background: rgba(255,255,255,0.06);
    color: #aaa;
    text-decoration: none;
    font-size: 13px;
    font-weight: 600;
    transition: background 0.2s;
  }
  .color-nav a .swatch {
    width: 14px;
    height: 14px;
    border-radius: 50%;
    border: 1.5px solid rgba(255,255,255,0.2);
  }
  .color-nav a.current {
    background: rgba(255,255,255,0.12);
    color: #fff;
  }

  .mockup-section {
    padding: 40px 20px 20px;
    scroll-margin-top: 60px;
  }

  .mockup-label {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 20px;
  }
  .mockup-number {
    font-size: 14px;
    font-weight: 700;
    color: #fff;
    background: rgba(255,255,255,0.1);
    width: 28px;
    height: 28px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .mockup-name {
    font-size: 18px;
    font-weight: 700;
    color: #fff;
  }
  .mockup-name .current-badge {
    font-size: 11px;
    font-weight: 600;
    background: rgba(255,200,50,0.2);
    color: #ffc832;
    padding: 3px 10px;
    border-radius: 10px;
    margin-left: 10px;
    vertical-align: middle;
  }
  .mockup-hex {
    font-size: 13px;
    color: #888;
    font-weight: 500;
    margin-top: 2px;
  }
  .mockup-desc {
    font-size: 13px;
    color: #777;
    margin-bottom: 20px;
    line-height: 1.5;
  }

  /* Phone frame */
  .phone-frame {
    max-width: 380px;
    margin: 0 auto;
    background: #FAF9F7;
    border-radius: 40px;
    overflow: hidden;
    box-shadow: 0 20px 60px rgba(0,0,0,0.4);
    border: 6px solid #2a2a3e;
  }

  .phone-screen {
    padding: 60px 20px 40px;
    min-height: 700px;
  }

  /* Greeting */
  .greeting {
    text-align: center;
    font-family: Georgia, 'Times New Roman', serif;
    font-style: italic;
    font-size: 30px;
    font-weight: 700;
    color: #2C2C2E;
    padding: 10px 0 28px;
  }

  /* Card */
  .nudge-card {
    background: #fff;
    border-radius: 16px;
    padding: 20px;
    box-shadow: 0 4px 12px var(--accent-shadow);
    border: 0.5px solid rgba(255,255,255,0.5);
    margin-bottom: 14px;
  }

  .person-name {
    font-family: Georgia, 'Times New Roman', serif;
    font-style: italic;
    font-size: 24px;
    color: #2C2C2E;
    margin-bottom: 4px;
  }
  .time-label {
    font-size: 14px;
    color: #8E8E93;
    margin-bottom: 12px;
  }
  .warm-message {
    font-size: 15px;
    color: #8E8E93;
    font-style: italic;
    margin-bottom: 18px;
    line-height: 1.45;
  }

  .action-row {
    display: flex;
    gap: 8px;
    margin-bottom: 10px;
  }
  .action-btn {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 5px;
    padding: 12px 0;
    background: #fff;
    border: 1px solid #E0E4F0;
    border-radius: 24px;
    font-family: 'Quicksand', sans-serif;
    font-size: 14px;
    font-weight: 500;
    color: var(--accent);
  }
  .action-btn svg { width: 15px; height: 15px; }

  .done-btn {
    width: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    padding: 16px 0;
    background: var(--accent);
    border: none;
    border-radius: 14px;
    font-family: 'Quicksand', sans-serif;
    font-size: 17px;
    font-weight: 700;
    color: #fff;
  }

  /* Second card (lighter, preview) */
  .nudge-card-secondary {
    opacity: 0.85;
  }

  /* Overflow row */
  .overflow-section {
    margin-top: 20px;
  }
  .overflow-toggle {
    font-family: 'Quicksand', sans-serif;
    font-size: 16px;
    font-weight: 600;
    color: var(--accent);
    background: none;
    border: none;
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 8px 0;
  }
  .overflow-list {
    background: #fff;
    border-radius: 16px;
    padding: 4px 16px;
    box-shadow: 0 4px 12px var(--accent-shadow);
    margin-top: 8px;
  }
  .overflow-row {
    display: flex;
    align-items: center;
    padding: 14px 0;
    border-bottom: 1px solid rgba(0,0,0,0.05);
  }
  .overflow-row:last-child { border-bottom: none; }
  .overflow-name {
    font-family: 'Quicksand', sans-serif;
    font-size: 16px;
    font-weight: 600;
    color: #2C2C2E;
    flex: 1;
  }
  .overflow-time {
    font-size: 13px;
    color: #8E8E93;
    margin-right: 12px;
  }
  .overflow-check {
    width: 24px;
    height: 24px;
    border-radius: 50%;
    border: 2px solid var(--accent);
    display: flex;
    align-items: center;
    justify-content: center;
  }

  /* Tab bar */
  .tab-bar {
    display: flex;
    justify-content: space-around;
    padding: 12px 0 8px;
    background: rgba(250,249,247,0.95);
    border-top: 0.5px solid rgba(0,0,0,0.08);
    margin: 20px -20px -40px;
    padding-bottom: 30px;
  }
  .tab-item {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    font-size: 10px;
    font-weight: 600;
    color: #8E8E93;
  }
  .tab-item.active { color: var(--accent); }
  .tab-item svg { width: 22px; height: 22px; }

  .divider {
    height: 40px;
  }

  /* Side-by-side swatch comparison */
  .swatch-comparison {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    margin: 30px auto 0;
    max-width: 380px;
    justify-content: center;
  }
  .swatch-chip {
    width: 44px;
    height: 44px;
    border-radius: 12px;
    border: 2px solid transparent;
    position: relative;
  }
  .swatch-chip.active {
    border-color: #fff;
    box-shadow: 0 0 0 2px rgba(255,255,255,0.3);
  }
  .swatch-chip span {
    position: absolute;
    bottom: -18px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 10px;
    color: #888;
    font-weight: 600;
  }
</style>
</head>
<body>

<div class="page-header">
  <h1>Dear Color Mockups</h1>
  <p>Scroll to compare. Tap a number to jump.</p>
</div>

<nav class="color-nav" id="nav"></nav>

<div id="mockups"></div>

<script>
const colors = [
  {
    name: "Current Nile Blue",
    hex: "#5C85D6",
    darkHex: "#7CA0E6",
    desc: "The current accent color. Bright, saturated blue.",
    current: true
  },
  {
    name: "Smythson Periwinkle",
    hex: "#7B89C9",
    darkHex: "#95A0D8",
    desc: "Inspired by Smythson's signature blue. Softer, more violet undertone, quieter on screen."
  },
  {
    name: "Noto Dusk",
    hex: "#6E7BB5",
    darkHex: "#8B96CC",
    desc: "Mediterranean twilight blue. Muted, dignified, with a purple lean."
  },
  {
    name: "Dusty Wisteria",
    hex: "#8080B2",
    darkHex: "#9999C7",
    desc: "A greyed-out lavender blue. Very quiet, luxury stationery feel."
  },
  {
    name: "Slate Iris",
    hex: "#6A6FA0",
    darkHex: "#8488B8",
    desc: "Deep, desaturated indigo. The most understated option. Feels like ink on linen."
  },
  {
    name: "Midnight Periwinkle",
    hex: "#5F6BAE",
    darkHex: "#7D88C4",
    desc: "Darker, richer periwinkle. Strong presence without the brightness."
  },
  {
    name: "Soft Wedgwood",
    hex: "#7090C0",
    darkHex: "#8AAAD4",
    desc: "Classic Wedgwood pottery blue. Warmer, more traditional, less purple."
  },
  {
    name: "Muted Cornflower",
    hex: "#7A8DC8",
    darkHex: "#94A5D6",
    desc: "Halfway between current and Smythson. Keeps some energy but pulls back the saturation."
  }
];

function makeSVG(type, color) {
  const c = color || 'currentColor';
  if (type === 'message') return `<svg viewBox="0 0 24 24" fill="none" stroke="${c}" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>`;
  if (type === 'phone') return `<svg viewBox="0 0 24 24" fill="none" stroke="${c}" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6A19.79 19.79 0 0 1 2.12 4.18 2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 22 16.92z"/></svg>`;
  if (type === 'video') return `<svg viewBox="0 0 24 24" fill="none" stroke="${c}" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><polygon points="23 7 16 12 23 17 23 7"/><rect x="1" y="5" width="15" height="14" rx="2" ry="2"/></svg>`;
  if (type === 'check') return `<svg viewBox="0 0 24 24" fill="none" stroke="${c}" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>`;
  if (type === 'home') return `<svg viewBox="0 0 24 24" fill="none" stroke="${c}" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg>`;
  if (type === 'people') return `<svg viewBox="0 0 24 24" fill="none" stroke="${c}" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>`;
  if (type === 'settings') return `<svg viewBox="0 0 24 24" fill="none" stroke="${c}" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>`;
  if (type === 'chevron') return `<svg viewBox="0 0 24 24" fill="none" stroke="${c}" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="width:13px;height:13px"><polyline points="6 9 12 15 18 9"/></svg>`;
  return '';
}

function renderMockup(c, i) {
  const shadowColor = c.hex + '14';
  const currentBadge = c.current ? '<span class="current-badge">CURRENT</span>' : '';
  return `
  <div class="mockup-section" id="color-${i}" style="--accent: ${c.hex}; --accent-shadow: ${shadowColor};">
    <div class="mockup-label">
      <div class="mockup-number">${i}</div>
      <div>
        <div class="mockup-name">${c.name}${currentBadge}</div>
        <div class="mockup-hex">${c.hex} / ${c.darkHex} dark</div>
      </div>
    </div>
    <div class="mockup-desc">${c.desc}</div>

    <div class="phone-frame">
      <div class="phone-screen">
        <div class="greeting">Good evening</div>

        <div class="nudge-card">
          <div class="person-name">Sarah</div>
          <div class="time-label">Last Thursday</div>
          <div class="warm-message">A moment of kindness could make her whole week.</div>
          <div class="action-row">
            <div class="action-btn">${makeSVG('message', c.hex)} Text</div>
            <div class="action-btn">${makeSVG('phone', c.hex)} Call</div>
            <div class="action-btn">${makeSVG('video', c.hex)} Video</div>
          </div>
          <div class="done-btn">${makeSVG('check', '#fff')} Done</div>
        </div>

        <div class="nudge-card nudge-card-secondary">
          <div class="person-name">Marcus</div>
          <div class="time-label">2 weeks ago</div>
          <div class="warm-message">Some friendships ripen slowly. This one is worth tending.</div>
          <div class="action-row">
            <div class="action-btn">${makeSVG('message', c.hex)} Text</div>
            <div class="action-btn">${makeSVG('phone', c.hex)} Call</div>
            <div class="action-btn">${makeSVG('video', c.hex)} Video</div>
          </div>
          <div class="done-btn">${makeSVG('check', '#fff')} Done</div>
        </div>

        <div class="overflow-section">
          <div class="overflow-toggle">${makeSVG('chevron', c.hex)} 3 more people</div>
          <div class="overflow-list">
            <div class="overflow-row">
              <div class="overflow-name">Jamie</div>
              <div class="overflow-time">3 days</div>
              <div class="overflow-check"></div>
            </div>
            <div class="overflow-row">
              <div class="overflow-name">Priya</div>
              <div class="overflow-time">1 week</div>
              <div class="overflow-check"></div>
            </div>
            <div class="overflow-row">
              <div class="overflow-name">Tom</div>
              <div class="overflow-time">10 days</div>
              <div class="overflow-check"></div>
            </div>
          </div>
        </div>

        <div class="tab-bar">
          <div class="tab-item active">${makeSVG('home', c.hex)}<span>Home</span></div>
          <div class="tab-item">${makeSVG('people', '#8E8E93')}<span>People</span></div>
          <div class="tab-item">${makeSVG('settings', '#8E8E93')}<span>Settings</span></div>
        </div>
      </div>
    </div>

    <div class="divider"></div>
  </div>`;
}

// Build nav
const nav = document.getElementById('nav');
colors.forEach((c, idx) => {
  const i = idx + 1;
  const cls = c.current ? ' current' : '';
  nav.innerHTML += `<a href="#color-${i}" class="${cls}"><span class="swatch" style="background:${c.hex}"></span>${i}</a>`;
});

// Build mockups
const container = document.getElementById('mockups');
colors.forEach((c, idx) => {
  container.innerHTML += renderMockup(c, idx + 1);
});
</script>

</body>
</html>
